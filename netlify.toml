# Config de build y headers HTTP para Netlify.
# Antes de este archivo, Netlify usaba defaults genéricos; con esto tunneamos
# el pipeline para Astro static y agregamos cache long-lived para /_astro/*
# (los assets con hash) + headers básicos de seguridad.

[build]
  command = "pnpm build"
  publish = "dist"

[build.environment]
  # Node y package manager
  NODE_VERSION = "22"
  # Astro CLI: no manda telemetría anónima (ahorra 5-10s por build)
  ASTRO_TELEMETRY_DISABLED = "1"
  # Astro y bundlers se optimizan solos con este flag
  NODE_ENV = "production"

# ── Redirects de URLs legacy del sitio anterior a Astro ────────────────
# Google Search Console lista ~156 URLs con error 5xx que corresponden a
# rutas del sitio viejo que ya no existen. Reencaminamos las que tienen
# equivalente actual (/news, /blog) y marcamos como Gone las que no
# (assets de Partytown, endpoint de Netlify Images). Convertir 5xx en
# 301/410 mejora la percepción de calidad del dominio en Google.

[[redirects]]
  from = "/news/*"
  to = "/posts/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/blog/*"
  to = "/posts/:splat"
  status = 301
  force = true

# Partytown fue removido en la migración a Astro 5; sus assets ya no existen.
[[redirects]]
  from = "/~partytown/*"
  to = "/404"
  status = 410
  force = true

# Netlify Image CDN reemplazado por Cloudinary; el endpoint ya no aplica.
[[redirects]]
  from = "/.netlify/images"
  to = "/404"
  status = 410
  force = true

[[redirects]]
  from = "/.netlify/images/*"
  to = "/404"
  status = 410
  force = true

# Path viejo en ingles /categories/* → nuevo en espanol /categorias/*
# (nota: el sitio viejo tenia typos en algunos slugs, ej mecanica_automotriz
# con underscore; el redirect abajo captura ambos)
[[redirects]]
  from = "/categories/*"
  to = "/categorias/:splat"
  status = 301
  force = true

# El slug mecanica_automotriz (con underscore) del sitio viejo era en realidad
# mecanica-automotriz (con guion). Redirigimos explicitamente al slug bueno.
[[redirects]]
  from = "/categorias/mecanica_automotriz"
  to = "/categorias/mecanica-automotriz"
  status = 301
  force = true

# terminos_condiciones (con underscore) del sitio viejo → /terminos actual
[[redirects]]
  from = "/terminos_condiciones"
  to = "/terminos"
  status = 301
  force = true

[[redirects]]
  from = "/terminos_condiciones/*"
  to = "/terminos"
  status = 301
  force = true

# ── Cache HTTP ──────────────────────────────────────────────────────────
# /_astro/* son assets con hash en el nombre (ej: /_astro/x8jf3.abc123.css),
# así que se pueden cachear por un año — cuando el contenido cambia, Astro
# genera un nombre distinto y el browser lo pide de nuevo.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fuentes locales rara vez cambian
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Sitemaps y RSS: cache moderado para que se refresquen cuando publiques
[[headers]]
  for = "/sitemap-*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/rss.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# ── Headers de seguridad para TODO el sitio ─────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
